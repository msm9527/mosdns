openapi: 3.1.0
info:
  title: mosdns Runtime API
  version: "2026-03-18"
  description: |
    当前规范只描述源码中真实注册的接口：
    - `/api/v1/*`
    - `/api/v3/audit/*`

    说明：
    - `/api/v1/control/overrides`、`/api/v1/control/upstreams`、`/api/v1/control/upstreams/tags` 是兼容别名，已在规范中标记为 `deprecated`
    - 核心 JSON 错误格式为 `{ "code": "...", "error": "..." }`
    - requery 插件接口使用独立错误格式 `{ "status": "error", "message": "..." }`
    - `GET /api/v1/update/status` 与 `POST /api/v1/update/check` 即使远程检查失败，当前实现仍返回 `200`
servers:
  - url: http://127.0.0.1:9099
    description: Default local control endpoint
tags:
  - name: Capture
    description: 临时运行日志抓取
  - name: Audit
    description: 审计日志与统计
  - name: Runtime
    description: 运行态摘要、健康检查、事件与分流解释
  - name: Overrides
    description: 全局覆盖、客户端别名
  - name: Upstream
    description: 上游 DNS 配置与健康检查
  - name: Switches
    description: 功能开关
  - name: Requery
    description: requery 运行时任务与调度
  - name: Rules
    description: 广告拦截与在线分流规则源
  - name: Config
    description: 配置导出与远程覆盖
  - name: Update
    description: 版本检查与程序更新
  - name: System
    description: 系统级操作
  - name: Cache
    description: 缓存实例与聚合缓存统计
  - name: Memory
    description: 记忆库、统计池与运行时名单
  - name: Lists
    description: |
      可编辑列表。
      其中 `rewrite` 属于特殊列表：每个值都是一条 `<匹配规则> <目标IP或目标域名>` 规则。
  - name: RuntimeStats
    description: 运行时聚合统计
  - name: Misc
    description: 其他辅助接口
paths:
  /api/v1/capture/start:
    post:
      tags: [Capture]
      summary: Start temporary log capture
      description: 开始临时抓取 DEBUG 级别运行日志。请求体可省略，默认抓取 120 秒。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureStartRequest'
            example:
              duration_seconds: 120
      responses:
        '200':
          description: Capture started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureStartResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
  /api/v1/capture/logs:
    get:
      tags: [Capture]
      summary: Read and clear captured logs
      description: 返回本次抓取到的结构化日志数组，并清空内存缓冲区。
      responses:
        '200':
          description: Captured logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapturedLogsResponse'
  /api/v3/audit/overview:
    get:
      tags: [Audit]
      summary: Get realtime audit overview
      description: |
        返回当前概览窗口的实时统计，并附带累计、最近 7 天、最近 3 天、24 小时内和 1 小时内的汇总数据。
      parameters:
        - $ref: '#/components/parameters/WindowQuery'
      responses:
        '200':
          description: Current overview window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditOverview'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/timeseries:
    get:
      tags: [Audit]
      summary: Get audit timeseries
      parameters:
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/AuditStepQuery'
      responses:
        '200':
          description: Timeseries points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditTimeseriesPoint'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/rank/domain:
    get:
      tags: [Audit]
      summary: Get domain rank
      parameters:
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Domain rank items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditRankItem'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/rank/client:
    get:
      tags: [Audit]
      summary: Get client rank
      parameters:
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Client rank items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditRankItem'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/rank/domain_set:
    get:
      tags: [Audit]
      summary: Get domain-set rank
      parameters:
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Domain-set rank items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditRankItem'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/logs:
    get:
      tags: [Audit]
      summary: Query audit logs (compat)
      parameters:
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/ClientIPQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/ExactQuery'
        - $ref: '#/components/parameters/ResponseCodeQuery'
        - $ref: '#/components/parameters/DomainSetQuery'
        - $ref: '#/components/parameters/CacheStatusQuery'
        - $ref: '#/components/parameters/UpstreamTagQuery'
        - $ref: '#/components/parameters/TransportQuery'
        - $ref: '#/components/parameters/AnswerQuery'
      responses:
        '200':
          description: Cursor-based audit query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogsResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/logs/search:
    post:
      tags: [Audit]
      summary: Structured audit log search
      description: 推荐前端和新调用方使用。支持关键词精确/模糊匹配、字段范围、日期范围和高级过滤组合。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogSearchRequest'
      responses:
        '200':
          description: Structured audit query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogsResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/logs/slow:
    get:
      tags: [Audit]
      summary: Query slow audit logs
      parameters:
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Slow logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/settings:
    get:
      tags: [Audit]
      summary: Get audit settings
      responses:
        '200':
          description: Current audit settings from main config and storage runtime status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditSettingsResponse'
        '500':
          $ref: '#/components/responses/ApiInternalError'
    put:
      tags: [Audit]
      summary: Update audit settings
      description: 保存后立即生效，无需重启。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditSettingsUpdateRequest'
      responses:
        '200':
          description: Updated audit settings persisted to main config and applied at runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditSettingsResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v3/audit/clear:
    post:
      tags: [Audit]
      summary: Clear audit logs and aggregates
      responses:
        '200':
          description: Cleared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/summary:
    get:
      tags: [Runtime]
      summary: Get runtime storage summary
      responses:
        '200':
          description: SQLite runtime summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSummaryResponse'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/health:
    get:
      tags: [Runtime]
      summary: Get runtime health report
      responses:
        '200':
          description: Runtime health report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeHealthResponse'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/events:
    get:
      tags: [Runtime]
      summary: List runtime system events
      parameters:
        - $ref: '#/components/parameters/ComponentQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: System events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemEventEntry'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/shunt/explain:
    get:
      tags: [Runtime]
      summary: Explain shunt decision for one domain
      parameters:
        - $ref: '#/components/parameters/DomainRequiredQuery'
        - $ref: '#/components/parameters/QTypeOptionalQuery'
        - $ref: '#/components/parameters/LiveQuery'
      responses:
        '200':
          description: Shunt explanation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShuntExplainResult'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/shunt/conflicts:
    get:
      tags: [Runtime]
      summary: List shunt conflicts
      parameters:
        - $ref: '#/components/parameters/LiveQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Conflict list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShuntConflictsResponse'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/overrides:
    get:
      tags: [Overrides]
      deprecated: true
      summary: Get global overrides (compat alias)
      description: 兼容别名，推荐改用 `/api/v1/overrides`。
      responses:
        '200':
          description: Current overrides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalOverridesResponse'
        '500':
          $ref: '#/components/responses/ApiInternalError'
    post:
      tags: [Overrides]
      deprecated: true
      summary: Save global overrides (compat alias)
      description: 兼容别名，推荐改用 `/api/v1/overrides`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalOverrides'
      responses:
        '200':
          description: Saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/overrides:
    get:
      tags: [Overrides]
      summary: Get global overrides
      responses:
        '200':
          description: Current overrides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalOverridesResponse'
        '500':
          $ref: '#/components/responses/ApiInternalError'
    post:
      tags: [Overrides]
      summary: Save global overrides
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalOverrides'
      responses:
        '200':
          description: Saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/clientname:
    get:
      tags: [Overrides]
      summary: Get client alias map
      responses:
        '200':
          description: Client alias map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringMap'
        '500':
          $ref: '#/components/responses/ApiInternalError'
    put:
      tags: [Overrides]
      summary: Replace client alias map
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StringMap'
      responses:
        '200':
          description: Saved alias map
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringMap'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/upstreams:
    get:
      tags: [Upstream]
      deprecated: true
      summary: Get upstream config (compat alias)
      description: 兼容别名，推荐改用 `/api/v1/upstream/config`。
      responses:
        '200':
          description: Upstream config grouped by plugin tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalUpstreamOverrides'
        '500':
          $ref: '#/components/responses/ApiInternalError'
    put:
      tags: [Upstream]
      deprecated: true
      summary: Replace upstream config (compat alias)
      description: 兼容别名，推荐改用 `/api/v1/upstream/config`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamConfigReplaceRequest'
      responses:
        '200':
          description: Saved or saved and applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '409':
          $ref: '#/components/responses/ApiConflict'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
        '500':
          $ref: '#/components/responses/ApiInternalError'
    post:
      tags: [Upstream]
      deprecated: true
      summary: Set one plugin upstream list (compat alias)
      description: 兼容旧入口，请优先改用 `/api/v1/upstream/config`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamConfigCompatRequest'
      responses:
        '200':
          description: Saved or saved and applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/upstreams/health:
    get:
      tags: [Upstream]
      summary: Get aggregated upstream health
      responses:
        '200':
          description: Upstream health overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamHealthOverview'
  /api/v1/control/upstreams/stats/reset:
    post:
      tags: [Upstream]
      deprecated: true
      summary: Reset upstream runtime stats (compat alias)
      description: 兼容旧入口，推荐改用 `/api/v1/upstream/stats/reset`。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpstreamStatsResetRequest'
      responses:
        '200':
          description: Upstream stats reset result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamStatsResetResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '413':
          $ref: '#/components/responses/ApiRequestTooLarge'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/upstreams/tags:
    get:
      tags: [Upstream]
      deprecated: true
      summary: Get upstream plugin tags (compat alias)
      description: 兼容别名，推荐改用 `/api/v1/upstream/tags`。
      responses:
        '200':
          description: Runtime upstream plugin tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringList'
  /api/v1/control/switches:
    get:
      tags: [Switches]
      summary: List all switches
      responses:
        '200':
          description: Switch states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SwitchState'
  /api/v1/control/switches/{name}:
    parameters:
      - $ref: '#/components/parameters/SwitchNamePath'
    get:
      tags: [Switches]
      summary: Get one switch
      responses:
        '200':
          description: Switch state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwitchState'
        '404':
          $ref: '#/components/responses/ApiNotFound'
    put:
      tags: [Switches]
      summary: Update one switch
      description: |
        支持三种输入：
        - `application/json`: `{ "value": "..." }`
        - `application/x-www-form-urlencoded`: `value=...`
        - `text/plain`: 直接提交值文本
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SwitchUpdateRequest'
          text/plain:
            schema:
              type: string
              description: Switch value as raw text
      responses:
        '200':
          description: Updated switch state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwitchState'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/control/requery:
    get:
      tags: [Requery]
      summary: Get requery config
      responses:
        '200':
          description: Requery runtime config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequeryConfig'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/status:
    get:
      tags: [Requery]
      summary: Get requery status snapshot
      responses:
        '200':
          description: Runtime status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequeryStatusSnapshot'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/summary:
    get:
      tags: [Requery]
      summary: Get requery summary
      responses:
        '200':
          description: Requery config, status, memory stats and recent runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequerySummaryResponse'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/jobs:
    get:
      tags: [Requery]
      summary: List runtime requery jobs
      responses:
        '200':
          description: Runtime job definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequeryJob'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/runs:
    get:
      tags: [Requery]
      summary: List runtime requery runs
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Runtime run history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequeryRun'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/checkpoints:
    get:
      tags: [Requery]
      summary: List runtime checkpoints
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/RunIDQuery'
      responses:
        '200':
          description: Runtime checkpoints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RequeryCheckpoint'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/trigger:
    post:
      tags: [Requery]
      summary: Trigger requery task
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequeryTriggerRequest'
      responses:
        '200':
          description: Task started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequeryTriggerResponse'
        '409':
          $ref: '#/components/responses/RequeryError'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/enqueue:
    post:
      tags: [Requery]
      summary: Enqueue on-demand refresh job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequeryRefreshJob'
      responses:
        '202':
          description: Job queued or skipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequeryEnqueueResponse'
        default:
          $ref: '#/components/responses/RequeryError'
  /api/v1/control/requery/cancel:
    post:
      tags: [Requery]
      summary: Cancel running requery task
      responses:
        '200':
          description: Cancellation requested
          content:
            application/json:
