          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagMessageResponse'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/memory/{tag}/verify:
    parameters:
      - $ref: '#/components/parameters/TagPath'
    post:
      tags: [Memory]
      summary: Mark one domain as verified
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyMemoryRequest'
      responses:
        '200':
          description: Verify result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyMemoryResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '404':
          $ref: '#/components/responses/ApiNotFound'
components:
  responses:
    ApiBadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ApiRequestTooLarge:
      description: Request body too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ApiNotFound:
      description: Resource or plugin not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ApiConflict:
      description: Conflict with current runtime state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ApiInternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ApiServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ApiBadGateway:
      description: Upstream or remote dependency failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ApiNotImplemented:
      description: Operation not implemented on current platform
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    RequeryError:
      description: Requery plugin error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RequeryErrorResponse'
  parameters:
    WindowQuery:
      name: window
      in: query
      description: 概览窗口秒数；默认读取当前审计设置中的 `overview_window_seconds`，最大 `3600`
      schema:
        type: integer
        minimum: 1
        maximum: 3600
    FromQuery:
      name: from
      in: query
      description: Unix 毫秒时间戳或 RFC3339。省略时使用默认窗口。
      schema:
        type: string
    ToQuery:
      name: to
      in: query
      description: Unix 毫秒时间戳或 RFC3339。省略时默认为当前时间。
      schema:
        type: string
    AuditStepQuery:
      name: step
      in: query
      description: timeseries 粒度
      schema:
        type: string
        enum: [minute, hour]
    LimitQuery:
      name: limit
      in: query
      description: 返回条数或上限。具体默认值由各接口决定。
      schema:
        type: integer
        minimum: 1
    OffsetQuery:
      name: offset
      in: query
      description: 偏移量
      schema:
        type: integer
        minimum: 0
    CursorQuery:
      name: cursor
      in: query
      description: 审计日志顺序翻页游标
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      description: 搜索关键字
      schema:
        type: string
    ExactQuery:
      name: exact
      in: query
      description: 审计搜索是否精确匹配
      schema:
        type: boolean
    DomainQuery:
      name: domain
      in: query
      schema:
        type: string
    DomainRequiredQuery:
      name: domain
      in: query
      required: true
      schema:
        type: string
    ClientIPQuery:
      name: client_ip
      in: query
      schema:
        type: string
    ResponseCodeQuery:
      name: rcode
      in: query
      schema:
        type: string
    DomainSetQuery:
      name: domain_set
      in: query
      schema:
        type: string
    CacheStatusQuery:
      name: cache_status
      in: query
      schema:
        type: string
    UpstreamTagQuery:
      name: upstream_tag
      in: query
      schema:
        type: string
    TransportQuery:
      name: transport
      in: query
      schema:
        type: string
    AnswerQuery:
      name: answer
      in: query
      schema:
        type: string
    ComponentQuery:
      name: component
      in: query
      schema:
        type: string
    QTypeOptionalQuery:
      name: qtype
      in: query
      description: DNS 查询类型；省略时按 `A` 解释
      schema:
        type: string
    LiveQuery:
      name: live
      in: query
      description: 是否把运行态热规则合并进分流分析；默认 true
      schema:
        type: boolean
        default: true
    PluginTagRequiredQuery:
      name: plugin_tag
      in: query
      required: true
      schema:
        type: string
    ApplyQuery:
      name: apply
      in: query
      description: 删除上游后是否立即热重载
      schema:
        type: boolean
        default: false
    RunIDQuery:
      name: run_id
      in: query
      schema:
        type: string
    IPRequiredQuery:
      name: ip
      in: query
      required: true
      schema:
        type: string
    TagPath:
      name: tag
      in: path
      required: true
      schema:
        type: string
    SwitchNamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
        enum:
          - block_response
          - client_proxy_mode
          - main_cache
          - branch_cache
          - fakeip_cache
          - probe_cache
          - block_query_type
          - block_ipv6
          - ad_block
          - cn_answer_mode
          - udp_fast_path
    UpstreamTagPath:
      name: upstreamTag
      in: path
      required: true
      schema:
        type: string
    RuleIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
