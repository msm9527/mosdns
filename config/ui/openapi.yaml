        '500':
          $ref: '#/components/responses/ApiInternalError'
  /api/v1/memory/{tag}/flush:
    parameters:
      - $ref: '#/components/parameters/TagPath'
    post:
      tags: [Memory]
      summary: Flush memory pool
      responses:
        '200':
