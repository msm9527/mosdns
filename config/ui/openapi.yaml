        - 每个 `item.value` 都是一条客户端 IP 或 CIDR
        - `client_ip_whitelist` 配合 `client_proxy_mode=whitelist` 使用
        - `client_ip_blacklist` 配合 `client_proxy_mode=blacklist` 使用

        当 `tag=rewrite` 时：
        - 每个 `item.value` 都是一条两列规则：`<匹配规则> <目标IP或目标域名>`
        - 如需为同一匹配规则配置多个目标，请重复写多行
        - 运行时会按匹配规则聚合目标并自动去重
      parameters:
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: List values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEntriesResponse'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '500':
          $ref: '#/components/responses/ApiInternalError'
    put:
      tags: [Lists]
      summary: Replace editable list values
      description: |
        整体替换某个可编辑列表的内容。

        当 `tag=client_ip_whitelist` 或 `tag=client_ip_blacklist` 时：
        - 每个数组元素对应一条客户端 IP 或 CIDR
        - `client_ip_whitelist` 配合 `client_proxy_mode=whitelist` 使用
        - `client_ip_blacklist` 配合 `client_proxy_mode=blacklist` 使用

        当 `tag=rewrite` 时，请按下面格式提交：
        - 每个数组元素对应一条规则
        - 规则格式：`<匹配规则> <目标IP或目标域名>`
        - 支持普通域名和 `full:`、`domain:` 等匹配写法
        - 同一匹配规则可重复写多行，用于配置多个目标
        - `rewrite` 仅影响 `A` / `AAAA` 查询，其他查询类型仍会继续走原解析链路
        - 目标为域名时，会查询 `rewrite` 插件配置中的 `dns` 上游，并直接返回展开后的 `A` / `AAAA` 结果
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListReplaceRequest'
            examples:
              rewrite:
                summary: Replace rewrite rules
                value:
                  values:
                    - example.com 1.2.3.4
                    - example.com 1.2.3.5
                    - example.com example.net
                    - full:api.example.com example.net
      responses:
        '200':
          description: Replace result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListReplaceResponse'
        '400':
          $ref: '#/components/responses/ApiBadRequest'
        '404':
          $ref: '#/components/responses/ApiNotFound'
  /api/v1/memory/{tag}/stats:
    parameters:
      - $ref: '#/components/parameters/TagPath'
    get:
      tags: [Memory]
