<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mosdns API Docs</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #09111f;
      --card: rgba(10, 18, 34, 0.92);
      --border: rgba(148, 163, 184, 0.22);
      --text: #e5ecf6;
      --muted: #9fb0c9;
      --accent: #22c55e;
      --accent-2: #0ea5e9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.16), transparent 24%),
        linear-gradient(180deg, #08101c 0%, #0c1524 100%);
      color: var(--text);
      font-family: "SF Pro Display", "PingFang SC", "Segoe UI", sans-serif;
    }

    .shell {
      min-height: 100vh;
      padding: 24px;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 auto 20px;
      max-width: 1480px;
      padding: 20px 24px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.04);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .actions a.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #04111a;
    }

    .actions a:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.35);
    }

    .swagger-wrap {
      max-width: 1480px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.28);
    }

    #swagger-ui {
      min-height: 70vh;
    }

    .load-error {
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px 20px;
      border: 1px solid rgba(248, 113, 113, 0.45);
      border-radius: 14px;
      background: rgba(127, 29, 29, 0.55);
      color: #fecaca;
    }

    .swagger-ui .topbar {
      display: none;
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .hero {
        padding: 18px;
      }

      .actions {
        width: 100%;
      }

      .actions a {
        flex: 1 1 160px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <h1>mosdns API 文档</h1>
        <p>当前页面直接读取 <code>/ui/openapi.yaml</code>，以重构后的真实运行接口为准。</p>
      </div>
      <div class="actions">
        <a class="primary" href="./openapi.yaml" target="_blank" rel="noopener">查看 OpenAPI YAML</a>
        <a href="/ui/#system-control">返回控制台</a>
        <a href="/ui/">仪表盘首页</a>
      </div>
    </section>

    <section class="swagger-wrap">
      <div id="swagger-ui"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    (function () {
      const mount = document.getElementById('swagger-ui');
      const specURL = new URL('./openapi.yaml', window.location.href).toString();

      function renderError(message) {
        const block = document.createElement('div');
        block.className = 'load-error';
        block.textContent = message;
        mount.replaceWith(block);
      }

      window.addEventListener('load', function () {
        if (!window.SwaggerUIBundle) {
          renderError('Swagger UI 资源加载失败，无法渲染 API 文档页面。');
          return;
        }

        window.SwaggerUIBundle({
          url: specURL,
          dom_id: '#swagger-ui',
          deepLinking: true,
          displayRequestDuration: true,
          docExpansion: 'list',
          filter: true,
          persistAuthorization: false,
          defaultModelsExpandDepth: 1,
          defaultModelExpandDepth: 2
        });
      });
    })();
  </script>
</body>
</html>
