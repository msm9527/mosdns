# mosdns V2 主入口配置
#
# 这个文件只保留“全局设置”和“子配置装配顺序”：
# 1. 日志、HTTP API、审计、控制库路径
# 2. sub_config 的 include 顺序
#
# 纯 V2 主线下，不再使用旧版 include / plugins 语法。
# 这里通过 `rule_providers.type=include` 顺序装载各个 V2 子文档。
# 装载顺序必须遵守依赖关系：
# - control 先于 sequence，因为 sequence 会读取 switch 状态
# - data / upstream 先于 sequence，因为 sequence 会引用它们
# - listener 最后加载，因为它们依赖前面已经注册完成的 entry

version: v2
# 日志配置：
# - 默认写到主配置目录下的 logs/，不依赖 /tmp
# - 相对路径会按 config.yaml 所在目录解析
log:
  level: warn
  file: /tmp/mosdns.log
# HTTP 管理接口：
# - UI、control API、运行时操作都走这里
api:
  http: 0.0.0.0:9099
# 审计配置：
# - 运行期概览走实时窗口，不再从全量日志表直接求平均值
# - 原始日志与分钟/小时聚合统一写入 SQLite
# - sqlite_path 固定写入 db/audit.db
audit:
  enabled: true
  overview_window_seconds: 60
  raw_retention_days: 7
  aggregate_retention_days: 30
  max_storage_mb: 128
  sqlite_path: db/audit.db
  flush_batch_size: 256
  flush_interval_ms: 250
  maintenance_interval_seconds: 60
# 运行态控制库：
# - 所有运行态真源统一写入 db/control.db
storage:
  control_db: db/control.db
# 子配置加载顺序：
# - 10: control 运行态定义
# - 20/21: 数据源、规则集、缓存、上游
# - 31~34: 主解析链
# - 40~42: requery 刷新链
# - 50: 所有监听入口
rule_providers:
  - name: control
    type: include
    source: sub_config/10-control.yaml
  - name: data_sources
    type: include
    source: sub_config/20-data-sources.yaml
  - name: data_cache_upstreams
    type: include
    source: sub_config/21-data-cache-upstreams.yaml
  - name: main_resolution
    type: include
    source: sub_config/31-main-resolution.yaml
  - name: main_routing
    type: include
    source: sub_config/32-main-not-in-list.yaml
  - name: main_ipv4_ipv6
    type: include
    source: sub_config/33-main-ipv4v6.yaml
  - name: main_entry
    type: include
    source: sub_config/34-main-entry.yaml
  - name: refresh_resolution
    type: include
    source: sub_config/40-refresh-resolution.yaml
  - name: refresh_routing
    type: include
    source: sub_config/41-refresh-not-in-list.yaml
  - name: refresh_ipv4_ipv6
    type: include
    source: sub_config/42-refresh-ipv4v6.yaml
  - name: listeners
    type: include
    source: sub_config/50-listeners.yaml
