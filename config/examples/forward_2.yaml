# 文件用途:
# - 构建“主分流入口服务” `sequence_main`，并监听本机 `127.0.0.1:5656`。
# - 该文件已移出默认运行目录，仅作为旁路/聚合入口示例保留。
# 依赖关系:
# - 仅在手动接入时使用，不参与默认 `config/config.yaml`。
plugins:
#把main主分流逻辑打包成一个对外服务供调用
  - tag: forward_all_in
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "udp://127.0.0.1:5656"

#主分流服务器
  - tag: udp_main
    type: udp_server
    args:
      entry: sequence_main
      listen: 127.0.0.1:5656

  - tag: tcp_main
    type: tcp_server
    args:
      entry: sequence_main
      listen: 127.0.0.1:5656
      idle_timeout: 720
