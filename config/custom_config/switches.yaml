# 用户自定义功能开关配置
#
# 这个文件是全部功能开关的长期配置真源。
# - 前端功能开关 API 的修改会直接写入这里，并立即同步到运行中的开关实例。
# - 你也可以手工修改这个文件，然后重启 mosdns 生效。
# - 这里不再走 control.db；数据库只保留运行态和生成态数据。
#
# 字段说明：
# - block_response: on/off，是否拦截黑名单和空响应结果。
# - client_proxy_mode: all/blacklist/whitelist，控制哪些客户端允许走代理链路；whitelist/blacklist 模式分别读取 rule/client_ip_whitelist.txt 和 rule/client_ip_blacklist.txt。
# - core_mode: secure/compat，控制未命中域名走安全（noleak）还是兼容（leak）补判链；默认推荐 secure，避免未知国外域名先泄露给国内上游。
# - main_cache: on/off，控制真实解析主缓存总开关。
# - branch_cache: on/off，控制真实解析分支缓存（国内/国外/ECS）。
# - domestic_ecs: on/off，控制国内真实解析是否附带 ECS。
# - foreign_ecs: on/off，控制国外真实解析是否附带 ECS。
# - fakeip_cache: on/off，控制 FakeIP DNS 响应缓存；开启后 FakeIP 响应才允许进入 UDP 快路径缓存，不影响系统记录 FakeIP 路径域名的运行记忆列表。
# - probe_cache: on/off，控制节点探测专用缓存。
# - block_query_type: on/off，控制 SOA/PTR/HTTPS 等类型屏蔽。
# - block_ipv6: on/off，控制 AAAA 请求屏蔽。
# - ad_block: on/off，控制 AdGuard 在线规则拦截。
# - cn_answer_mode: realip/fakeip，控制国内域名返回真实 IP 还是 FakeIP。
# - udp_fast_path: on/off，控制 UDP 极限缓存快路径。

block_response: "on"

client_proxy_mode: "all"

core_mode: "secure"

main_cache: "on"

branch_cache: "on"

domestic_ecs: "on"

foreign_ecs: "off"

fakeip_cache: "on"

probe_cache: "on"

block_query_type: "on"

block_ipv6: "on"

ad_block: "off"

cn_answer_mode: "realip"

udp_fast_path: "on"
