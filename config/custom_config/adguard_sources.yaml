# 用户自定义广告拦截规则源
#
# 这是“广告拦截”入口的长期配置真源。
# - 前端规则管理页保存后会直接改这个文件，并立即热重载相关插件。
# - 你也可以手工修改这个文件，然后重启 mosdns 生效。
# - 数据库只保留运行态元数据，例如 rule_count / last_updated / last_error。
# - 原始规则文件保留在 config/adguard/ 目录；这里不再混入运行态统计字段。
#
# 字段说明：
# - id: 规则源唯一标识，只允许使用字母、数字、下划线和中划线。
# - name: Web UI 显示名称。
# - enabled: 是否启用该规则源。
# - behavior: 规则语义。广告入口允许：
#   - adguard: 原生 AdGuard 语法，支持 allow/block/regexp。
#   - domain: 已经归一化成域名集合的规则源。
# - match_mode: 匹配模式。广告入口允许：
#   - adguard_native: 按 AdGuard 原生语法解析。
#   - domain_set: 按域名集合解析，适合 geosite/list/json/yaml/srs/mrs。
# - format: 原始文件格式，例如 rules / list / txt / json / yaml / srs / mrs。
# - source_kind: local / remote。
#   - local: 直接读取 path 指向的本地文件。
#   - remote: 从 url 下载原始文件到 path，然后按 format 解析。
# - path: 原始文件相对 config 根目录的路径，建议保留在 adguard/ 目录下。
# - url: 仅 remote 源需要填写。
# - auto_update: 仅 remote 源有效，表示是否允许后台自动更新。
# - update_interval_hours: 仅 remote 源有效，自动更新间隔（小时）。

sources:
  - id: httpdns
    name: HttpDNS
    enabled: true
    behavior: adguard
    match_mode: adguard_native
    format: rules
    source_kind: remote
    path: adguard/httpdns.rules
    url: https://raw.githubusercontent.com/yyysuo/firetv/refs/heads/master/httpdns.txt
    auto_update: false
    update_interval_hours: 24

  - id: pcdn1
    name: PCDN Filter 1
    enabled: true
    behavior: adguard
    match_mode: adguard_native
    format: rules
    source_kind: remote
    path: adguard/pcdn1.rules
    url: https://thhbdd.github.io/Block-pcdn-domains/ban.txt
    auto_update: false
    update_interval_hours: 24

  - id: pcdn2
    name: PCDN Filter 2
    enabled: true
    behavior: adguard
    match_mode: adguard_native
    format: rules
    source_kind: remote
    path: adguard/pcdn2.rules
    url: https://cdn.jsdelivr.net/gh/susetao/PCDNFilter-CHN-@main/PCDNFilter.txt
    auto_update: false
    update_interval_hours: 24
