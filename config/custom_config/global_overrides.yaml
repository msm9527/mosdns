# 用户自定义全局覆盖配置
#
# 这个文件是 socks5 / ecs / 文本替换规则 的长期配置真源。
# - 前端保存会直接改这个文件，并在运行中热重载。
# - 你也可以手工修改这个文件，然后重启 mosdns 生效。
# - 这里不再走 control.db，数据库只负责运行态和生成态数据。
#
# 字段说明：
# - socks5: 给规则下载、更新等非 DNS 上游请求提供统一代理地址，例如 127.0.0.1:7891
# - ecs: 用于替换配置里的 ECS 指定值；填 auto 表示使用公网客户端地址自动生成 ECS
# - replacements: 可选的字符串替换表，适合少量精确替换

socks5: 127.0.0.1:7891
ecs: auto
replacements: []
