# 主解析辅助链
#
# 这一层负责把“国内 / 国外 / fakeip”这些基础动作封装成可复用 sequence，
# 供后面的 IPv4 / IPv6 主路由复用。

version: v2

policies:
  # 无缓存的基础真实解析链。
  - name: sequence_google_raw
    type: sequence
    args:
      - matches: switch 'foreign_ecs:on'
        exec: ecs __foreign_ecs__
      - exec: $foreign
      - exec: cname_remover

  # 兼容旧命名的国外真实解析链；默认国外不再附带 ECS。
  - name: sequence_google_node_raw
    type: sequence
    args:
      - matches: switch 'foreign_ecs:on'
        exec: ecs __foreign_ecs__
      - exec: $foreign
      - exec: cname_remover

  - name: sequence_local_raw
    type: sequence
    args:
      - matches: switch 'domestic_ecs:on'
        exec: ecs __domestic_ecs__
      - exec: $domestic
      - exec: cname_remover

  # 国外普通真实解析链：
  # - main_cache 负责跨真实链共享
  # - branch_cache 负责国外分支局部缓存
  - name: sequence_google
    type: sequence
    args:
      - matches: switch 'main_cache:on'
        exec: $cache_main
      - matches: switch 'branch_cache:on'
        exec: $cache_branch_foreign
      - exec: $sequence_google_raw

  # 提供给独立监听端口的国外真实解析入口。
  - name: sequence_google_in
    type: sequence
    args:
      - exec: $sequence_google

  # 兼容旧命名的国外真实解析链；默认不启用 ECS。
  - name: sequence_google_node
    type: sequence
    args:
      - matches: switch 'main_cache:on'
        exec: $cache_main
      - matches: switch 'branch_cache:on'
        exec: $cache_branch_foreign
      - exec: $sequence_google_node_raw

  # 未命中 noleak 首查走普通国外真实解析；
  # 如果该链路卡住或直接失败，则快速退回普通国外真实解析入口，
  # 避免冷查询直接把 timeout / SERVFAIL 暴露给主入口。
  - name: sequence_google_node_resilient
    type: fallback
    args:
      primary: sequence_google_node
      secondary: sequence_google
      threshold: 350
      always_standby: false

  # 国内真实解析链。
  - name: sequence_local
    type: sequence
    args:
      - matches: switch 'main_cache:on'
        exec: $cache_main
      - matches: switch 'branch_cache:on'
        exec: $cache_branch_domestic
      - exec: $sequence_local_raw

  # 仅负责真正生成国内 fakeip 的链路。
  - name: sequence_local_fake_generated
    type: sequence
    args:
      - matches: switch 'fakeip_cache:on'
        exec: $cache_fakeip_domestic
      - exec: $cnfake
      - exec: ttl 5

  # 国内 fakeip 链路：
  # - fast_mark 10 时仍回到真实解析
  # - 只有真正生成 fakeip 时才进入 fakeip 缓存
  - name: sequence_local_fake
    type: sequence
    args:
      - matches: fast_mark 10
        exec: $sequence_local
      - matches: '!fast_mark 10'
        exec: $sequence_local_fake_generated

  # 国内 fakeip 后立即退出的版本。
  - name: sequence_local_fake_exit
    type: sequence
    args:
      - matches: fast_mark 10
        exec: exit
      - exec: $sequence_local_fake_generated

  # 根据 cn_answer_mode 在 realip/fakeip 间切换。
  - name: sequence_local_divert
    type: sequence
    args:
      - matches: switch 'cn_answer_mode:realip'
        exec: $sequence_local
      - matches: switch 'cn_answer_mode:fakeip'
        exec: $sequence_local_fake

  # 仅负责真正生成代理 fakeip 的链路。
  - name: sequence_fakeip_generated
    type: sequence
    args:
      - matches: switch 'fakeip_cache:on'
        exec: $cache_fakeip_proxy
      - exec: $nocnfake
      - exec: exit

  # 进入 fakeip 池并按需补记忆列表的实际生成链。
  - name: sequence_fakeip_generated_addlist
    type: sequence
    args:
      - matches: switch 'fakeip_cache:on'
        exec: $cache_fakeip_proxy
      - exec: $nocnfake
      - matches: '!fast_mark 12'
        exec: $my_fakeiplist
      - exec: exit

  # 直接进入 fakeip 池。
  - name: sequence_fakeip
    type: sequence
    args:
      - matches: fast_mark 9
        exec:
          - $sequence_google
          - exit
      - exec: $sequence_fakeip_generated

  # 进入 fakeip 池并按需补记忆列表。
  - name: sequence_fakeip_addlist
    type: sequence
    args:
      - matches: fast_mark 9
        exec:
          - $sequence_google
          - exit
      - exec: $sequence_fakeip_generated_addlist
