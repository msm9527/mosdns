# 缓存与上游定义
#
# 这一层放“被 sequence 直接调用的基础执行单元”：
# - 各类 cache
# - 国内/国外/假 IP 所需的 aliapi 上游组
#
# 这些插件不负责分流判断，只负责真正发起查询或承接缓存。
# 缓存策略参数的系统级真源在 `sub_config/cache_policies.yaml`。
#
# 重要：
# - 用户平时需要改的上游 DNS / socks5 / ecs，不建议直接改这里
# - 这份文件现在只保留“基线配置”
# - 实际长期维护入口在 `config/custom_config/`
#   - `custom_config/global_overrides.yaml`
#   - `custom_config/upstreams.yaml`
# - 前端 API 保存和手工修改，优先都针对上述 custom_config 文件
# - 缓存策略本身属于系统调优基线，不放 custom_config，也不进数据库

version: v2

policies:
  # 真实解析主缓存：
  # - 跨国内/国外真实解析链共享
  # - 不再承担 fakeip 结果缓存
  - name: cache_main
    type: cache
    args:
      enable_ecs: true

  # 国内真实解析分支缓存。开启 ECS 时缓存 key 会包含 ECS，避免调度结果串用。
  - name: cache_branch_domestic
    type: cache
    args:
      enable_ecs: true

  # 国外真实解析分支缓存。foreign_ecs 开启时仍使用同一组国外上游，但缓存 key 会包含 ECS。
  - name: cache_branch_foreign
    type: cache
    args:
      enable_ecs: true

  # 兼容旧配置保留的国外 ECS 分支缓存；新链路不再直接使用。
  - name: cache_branch_foreign_ecs
    type: cache
    args:
      enable_ecs: true

  # 国内 fakeip 响应缓存。
  - name: cache_fakeip_domestic
    type: cache
    args: {}

  # 代理 fakeip 响应缓存。
  - name: cache_fakeip_proxy
    type: cache
    args: {}

  # 节点探测专用缓存。
  - name: cache_probe
    type: cache
    args: {}

  # 国内真实解析上游。
  - name: domestic
    type: aliapi
    args:
      concurrent: 3
      default_upstream_query_timeout: 800
      negative_response_grace_ms: 50
      failure_suppress_ttl: 10
      persistent_servfail_threshold: 3
      persistent_servfail_ttl: 60
      upstream_failure_threshold: 2
      upstream_circuit_break_seconds: 60
      upstreams:
        - addr: 223.5.5.5
          upstream_query_timeout: 800
        - addr: 223.6.6.6
          upstream_query_timeout: 800

  # 国外解析上游。
  - name: foreign
    type: aliapi
    args:
      concurrent: 2
      default_upstream_query_timeout: 1000
      negative_response_grace_ms: 50
      failure_suppress_ttl: 10
      persistent_servfail_threshold: 3
      persistent_servfail_ttl: 60
      upstream_failure_threshold: 2
      upstream_circuit_break_seconds: 60
      upstreams:
        - addr: https://1.1.1.1/dns-query
          socks5: 127.0.0.1:7891
          upstream_query_timeout: 1000
        - addr: https://8.8.8.8/dns-query
          socks5: 127.0.0.1:7891
          upstream_query_timeout: 1000

  # 兼容旧配置保留的国外带 ECS 专用上游；新链路不再直接使用。
  - name: foreignecs
    type: aliapi
    args:
      concurrent: 1
      default_upstream_query_timeout: 1000
      negative_response_grace_ms: 50
      failure_suppress_ttl: 10
      persistent_servfail_threshold: 3
      persistent_servfail_ttl: 60
      upstream_failure_threshold: 2
      upstream_circuit_break_seconds: 60
      upstreams:
        - addr: https://8.8.8.8/dns-query
          socks5: 127.0.0.1:7891
          upstream_query_timeout: 1000

  # 国外 fakeip 生成器入口。
  - name: nocnfake
    type: aliapi
    args:
      concurrent: 1
      default_upstream_query_timeout: 500
      failure_suppress_ttl: 5
      persistent_servfail_threshold: 3
      persistent_servfail_ttl: 30
      upstream_failure_threshold: 2
      upstream_circuit_break_seconds: 30
      upstreams:
        - addr: udp://127.0.0.1:6666
          upstream_query_timeout: 500

  # 国内 fakeip 生成器入口。
  - name: cnfake
    type: aliapi
    args:
      concurrent: 1
      default_upstream_query_timeout: 500
      failure_suppress_ttl: 5
      persistent_servfail_threshold: 3
      persistent_servfail_ttl: 30
      upstream_failure_threshold: 2
      upstream_circuit_break_seconds: 30
      upstreams:
        - addr: udp://127.0.0.1:1053
          upstream_query_timeout: 500
