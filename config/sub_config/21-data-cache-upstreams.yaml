# 缓存与上游定义
#
# 这一层放“被 sequence 直接调用的基础执行单元”：
# - 各类 cache
# - 国内/国外/假 IP 所需的 aliapi 上游组
#
# 这些插件不负责分流判断，只负责真正发起查询或承接缓存。
# 缓存策略参数的系统级真源在 `sub_config/cache_policies.yaml`。
#
# 重要：
# - 用户平时需要改的上游 DNS / socks5 / ecs，不建议直接改这里
# - 这份文件现在只保留“基线配置”
# - 实际长期维护入口在 `config/custom_config/`
#   - `custom_config/global_overrides.yaml`
#   - `custom_config/upstreams.yaml`
# - 前端 API 保存和手工修改，优先都针对上述 custom_config 文件
# - 缓存策略本身属于系统调优基线，不放 custom_config，也不进数据库

version: v2

policies:
  # 真实解析主缓存：
  # - 跨国内/国外真实解析链共享
  # - 不再承担 fakeip 结果缓存
  - name: cache_main
    type: cache
    args: {}

  # 国内真实解析分支缓存。
  - name: cache_branch_domestic
    type: cache
    args: {}

  # 国外真实解析分支缓存。
  - name: cache_branch_foreign
    type: cache
    args: {}

  # 国外 ECS 真实解析分支缓存。
  - name: cache_branch_foreign_ecs
    type: cache
    args:
      enable_ecs: true

  # 国内 fakeip 响应缓存。
  - name: cache_fakeip_domestic
    type: cache
    args: {}

  # 代理 fakeip 响应缓存。
  - name: cache_fakeip_proxy
    type: cache
    args: {}

  # 节点探测专用缓存。
  - name: cache_probe
    type: cache
    args: {}

  # 国内真实解析上游。
  - name: domestic
    type: aliapi
    args:
      concurrent: 3
      upstreams:
        - addr: 223.5.5.5
        - addr: 223.6.6.6

  # 国外解析上游。
  - name: foreign
    type: aliapi
    args:
      concurrent: 2
      upstreams:
        - addr: https://1.1.1.1/dns-query
          socks5: 127.0.0.1:7891
        - addr: https://8.8.8.8/dns-query
          socks5: 127.0.0.1:7891
          upstream_query_timeout: 1000

  # 国外带 ECS 的专用上游。
  - name: foreignecs
    type: aliapi
    args:
      concurrent: 1
      upstreams:
        - addr: https://8.8.8.8/dns-query
          socks5: 127.0.0.1:7891

  # 国外 fakeip 生成器入口。
  - name: nocnfake
    type: aliapi
    args:
      concurrent: 1
      upstreams:
        - addr: udp://127.0.0.1:6666

  # 国内 fakeip 生成器入口。
  - name: cnfake
    type: aliapi
    args:
      concurrent: 1
      upstreams:
        - addr: udp://127.0.0.1:1053
