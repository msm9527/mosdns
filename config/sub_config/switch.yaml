# 文件用途:
# - 定义可热更新的具名开关实例。
# - 所有开关统一写入 `rule/switches.json`，不再拆成多个 `switchX.txt`。
# - 开关值统一使用语义化字符串，而不是 `A/B`。
# - Web UI 统一通过集中接口读取和修改:
#   - `GET /plugins/switches/show`
#   - `POST /plugins/switches/{name}`
#   - 布尔类开关: `on` / `off`
#   - 核心模式: `compat` / `secure`
#   - 国内应答模式: `realip` / `fakeip`
plugins:
  - tag: block_response
    type: switch
    args:
      name: block_response
      state_file_path: "rule/switches.json"

  - tag: client_proxy_mode
    type: switch
    args:
      name: client_proxy_mode
      state_file_path: "rule/switches.json"

  - tag: core_mode
    type: switch
    args:
      name: core_mode
      state_file_path: "rule/switches.json"

  - tag: branch_cache
    type: switch
    args:
      name: branch_cache
      state_file_path: "rule/switches.json"

  - tag: main_cache
    type: switch
    args:
      name: main_cache
      state_file_path: "rule/switches.json"

  - tag: block_query_type
    type: switch
    args:
      name: block_query_type
      state_file_path: "rule/switches.json"

  - tag: block_ipv6
    type: switch
    args:
      name: block_ipv6
      state_file_path: "rule/switches.json"

  - tag: ad_block
    type: switch
    args:
      name: ad_block
      state_file_path: "rule/switches.json"

  - tag: cn_answer_mode
    type: switch
    args:
      name: cn_answer_mode
      state_file_path: "rule/switches.json"

  - tag: prefer_ipv4
    type: switch
    args:
      name: prefer_ipv4
      state_file_path: "rule/switches.json"

  - tag: prefer_ipv6
    type: switch
    args:
      name: prefer_ipv6
      state_file_path: "rule/switches.json"

  - tag: udp_fast_path
    type: switch
    args:
      name: udp_fast_path
      state_file_path: "rule/switches.json"
