# 文件用途:
# - 定义国外上游 `foreign`，以及其专用对外监听端口 `:7733`（调试/旁路用）。
# 依赖关系:
# - 被 `forward_1.yaml` 的 `sequence_google` 复用。
# 说明:
# - 这里是“列表外/代理域名”常用解析链路，不带 ECS。
plugins:
#定义了一个带过期缓存的内部使用/外部使用的国外dns服务器
#转发dns请求到国外dns
  - tag: foreign
    type: aliapi
    args:
      concurrent: 2
      upstreams:
        - addr: "https://1.1.1.1/dns-query"
          socks5: "127.0.0.1:7891"
        - addr: "https://8.8.8.8/dns-query"
          socks5: "127.0.0.1:7891"
          upstream_query_timeout: 1000

  # 保持调试入口在本文件内可初始化，避免依赖后续 include 才出现的 sequence_google。
  - tag: sequence_google_in
    type: sequence
    args:
      - matches: switch 'branch_cache:on'
        exec: $cache_google
      - exec: $foreign
      - exec: cname_remover

#国外
  - tag: udp_google
    type: udp_server
    args:
      entry: sequence_google_in
      listen: ":7733"

  - tag: tcp_google
    type: tcp_server
    args:
      entry: sequence_google_in
      listen: ":7733"
