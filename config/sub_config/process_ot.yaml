# 文件用途:
# - 处理非 A / AAAA 请求（如 TXT/MX/SRV 等）。
# 分流策略:
# - `fast_mark 16`: 走国内链路。
# - 其他: 走国外链路。
plugins:
#处理非A、AAAA请求
  - tag: sequence_other
    type: sequence
    args:
      - matches: fast_mark 16
        exec: $sequence_local          #geositecn向国内dns请求
      - matches: "!fast_mark 16"
        exec: $sequence_google         #!geositecn向国外dns请求
