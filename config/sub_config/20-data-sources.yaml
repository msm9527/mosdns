# 数据源与规则提供者
#
# 这一层只放“提供数据”的插件，不承担主流程编排：
# - adguard 规则
# - 动态生成/记忆类 domain_output
# - 本地文件规则集
# - SRS / JSON 远程规则源
# - 统一命中标记器 unified_matcher1
#
# 主解析链会通过 fast_mark 和这些 provider 的 tag 来做后续分流。

version: v2

policies:
  # 广告规则目录。
  - name: adguard
    type: adguard_rule
    args:
      dir: adguard/
      socks5: 127.0.0.1:7891

  # 热门域名统计。
  # 说明：
  # - 统计结果只保存在 control.db 的 generated_dataset 表中
  # - 不再自动写入 gen/top_domains.txt 这类文件
  # - `persist_interval` 控制刷盘周期（秒）
  # - `max_entries` 控制最多保留多少个域名统计项，超出后新项会被丢弃
  - name: top_domains
    type: domain_output
    args:
      enable_flags: true
      max_entries: 200000
      persist_interval: 36000

  # 记忆直连域名。
  # 说明：
  # - domain_output 会把统计与生成规则都写入 control.db
  # - `publish_to` 直接指向下游 provider tag，运行时通过内部插件调用热更新
  # - 不再通过 loopback HTTP 调 `/api/v1/lists/...`
  - name: my_realiplist
    type: domain_output
    args:
      publish_to: my_realiprule
      max_entries: 80000
      persist_interval: 36005

  # 记忆代理域名。
  - name: my_fakeiplist
    type: domain_output
    args:
      publish_to: my_fakeiprule
      max_entries: 80000
      persist_interval: 36010

  # 记忆无 IPv6 域名。
  - name: my_nov6list
    type: domain_output
    args:
      publish_to: my_nov6rule
      max_entries: 120000
      persist_interval: 36040

  # 记忆无 IPv4 域名。
  - name: my_nov4list
    type: domain_output
    args:
      publish_to: my_nov4rule
      max_entries: 80000
      persist_interval: 36030

  # 节点模式下的无 IPv6 记忆域名。
  - name: my_nodenov6list
    type: domain_output
    args:
      publish_to: my_nodenov6rule
      max_entries: 50000
      persist_interval: 36060

  # 节点模式下的无 IPv4 记忆域名。
  - name: my_nodenov4list
    type: domain_output
    args:
      publish_to: my_nodenov4rule
      max_entries: 50000
      persist_interval: 36080

  # 强制直连 IP 段。
  - name: direct_ip
    type: ip_set
    args:
      files:
        - rule/direct_ip.txt

  # 响应重写规则。
  - name: rewrite
    type: rewrite
    args:
      files:
        - rule/rewrite.txt
      dns: 127.0.0.1:2222

  # 订阅补充：代理补充规则。
  - name: cusnocn
    type: sd_set_light
    args:
      socks5: 127.0.0.1:7891
      local_config: srs/cusnocn.json

  # 订阅补充：直连补充规则。
  - name: cuscn
    type: sd_set_light
    args:
      socks5: 127.0.0.1:7891
      local_config: srs/cuscn.json

  # 记忆类规则 provider。
  # 说明：
  # - `generated_from` 表示直接从对应的 domain_output 规则数据集读取
  # - 热更新时也直接回写数据库，不再走 `gen/*.txt`
  - name: my_realiprule
    type: domain_set_light
    args:
      generated_from: my_realiplist
  - name: my_fakeiprule
    type: domain_set_light
    args:
      generated_from: my_fakeiplist
  - name: my_nov6rule
    type: domain_set_light
    args:
      generated_from: my_nov6list
  - name: my_nov4rule
    type: domain_set_light
    args:
      generated_from: my_nov4list

  # 节点模式记忆规则 provider。
  - name: my_nodenov6rule
    type: domain_set
    args:
      generated_from: my_nodenov6list
  - name: my_nodenov4rule
    type: domain_set
    args:
      generated_from: my_nodenov4list

  # 规则源：国内域名集、国内 IP 集、国外域名集。
  - name: geosite_cn
    type: sd_set_light
    args:
      socks5: 127.0.0.1:7891
      local_config: srs/geositecn.json
  - name: geoip_cn
    type: si_set
    args:
      socks5: 127.0.0.1:7891
      local_config: srs/geoipcn.json
  - name: geosite_no_cn
    type: sd_set_light
    args:
      socks5: 127.0.0.1:7891
      local_config: srs/geositenocn.json

  # 客户端 IP 白黑名单。
  - name: client_ip
    type: ip_set
    args:
      files:
        - rule/client_ip.txt

  # 静态规则集。
  - name: whitelist
    type: domain_set_light
    args:
      files:
        - rule/whitelist.txt
  - name: cnfakeipfilter
    type: domain_set_light
    args:
      files:
        - rule/cnfakeipfilter.txt
  - name: blocklist
    type: domain_set_light
    args:
      files:
        - rule/blocklist.txt
  - name: realiplist
    type: domain_set_light
    args:
      files:
        - rule/realiplist.txt
  - name: greylist
    type: domain_set_light
    args:
      files:
        - rule/greylist.txt
  - name: ddnslist
    type: domain_set_light
    args:
      files:
        - rule/ddnslist.txt

  # 统一命中标记器。
  # 所有基础规则先在这里收敛为 fast_mark，后续 sequence 再按 fast_mark 走分支。
  - name: unified_matcher1
    type: domain_mapper
    args:
      default_mark: 17
      default_tag: 未命中
      rules:
        - tag: blocklist
          mark: 1
          output_tag: 黑名单
        - tag: my_nov4rule
          mark: 2
          output_tag: 记忆无V4
        - tag: my_nov6rule
          mark: 3
          output_tag: 记忆无V6
        - tag: adguard
          mark: 5
          output_tag: 广告屏蔽
        - tag: ddnslist
          mark: 6
          output_tag: DDNS域名
        - tag: greylist
          mark: 7
          output_tag: 灰名单
        - tag: whitelist
          mark: 8
          output_tag: 白名单
        - tag: realiplist
          mark: 9
          output_tag: '!CN fakeip filter'
        - tag: cnfakeipfilter
          mark: 10
          output_tag: CN fakeip filter
        - tag: my_realiprule
          mark: 11
          output_tag: 记忆直连
        - tag: my_fakeiprule
          mark: 12
          output_tag: 记忆代理
        - tag: cuscn
          mark: 13
          output_tag: 订阅直连补充
        - tag: geosite_no_cn
          mark: 14
          output_tag: 订阅代理
        - tag: cusnocn
          mark: 15
          output_tag: 订阅代理补充
        - tag: geosite_cn
          mark: 16
          output_tag: 订阅直连
