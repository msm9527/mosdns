# 文件用途:
# - 定义带 ECS 的国外上游 `foreignecs`，用于节点域名等“安全模式首查”场景。
# 依赖关系:
# - 被 `forward_1.yaml`/`requery_refresh.yaml` 的 `sequence_google_node*` 复用。
# 说明:
# - ECS 可帮助上游给出更接近客户端地理位置的响应（具体效果视上游支持）。
plugins:
#定义了一个带过期缓存的内部使用/外部使用的国外dns服务器（带ecs），供节点域名解析使用
#在不泄露版本中，供不在域名列表中的域名初次解析使用
  - tag: foreignecs
    type: aliapi
    args:
      concurrent: 1
      upstreams:
        - addr: "https://8.8.8.8/dns-query"
          socks5: "127.0.0.1:7891"

  - tag: sequence_google_node
    type: sequence
    args:
      - exec: ecs 2408:8888::8
      - exec: $cache_google_node
      - exec: $foreignecs
      - exec: cname_remover

  - tag: udp_google_ecs
    type: udp_server
    args:
      entry: sequence_google_node
      listen: ":7744"

  - tag: tcp_google_ecs
    type: tcp_server
    args:
      entry: sequence_google_node
      listen: ":7744"
