# 文件用途:
# - 处理“列表外域名”在拿到上游响应后的 IP 判定与归档。
# 核心动作:
# - 命中 `direct_ip` / `geoip_cn` 后归入直连记忆（my_realiplist）。
# - 命中非 CN 结果时归入代理记忆（my_fakeiplist）。
# - 按 `cn_answer_mode` 决定国内域名是返回 realip 还是转 fakeip。
#列表外的域名获取ip后进行对比决定如何发放ip
plugins:
  - tag: sequence_not_in_list_direct_finalize
    type: sequence
    args:
      - exec: $my_realiplist                     #把此域名加入自生成国内域名列表
      - matches: switch 'cn_answer_mode:fakeip'
        exec: $sequence_local_fake
      - exec: exit                               #上游dns返回了自定义直连ip列表中的ip，结束流程

  - tag: sequence_not_in_list_cn_finalize
    type: sequence
    args:
      - exec: $my_realiplist                     #如果获取了cn ip，则加入自生成国内域名列表
      - matches: switch 'cn_answer_mode:fakeip'
        exec: $sequence_local_fake

  - tag: sequence_not_in_list_ipmatch
    type: sequence
    args:
      - matches: "resp_ip $direct_ip"            
        exec: fast_mark 24                       #标记上游dns返回了直连ip列表中的ip
      - matches: fast_mark 24
        exec: $sequence_not_in_list_direct_finalize
      - matches: "!resp_ip $geoip_cn"            #标记列表外域名上游dns获取了!cn ip
        exec: fast_mark 25
      - matches: fast_mark 25                    #向sing-box请求fakeip并加入自生成国外域名列表
        exec: $sequence_fakeip_addlist
      - matches: "!fast_mark 25"
        exec: $sequence_not_in_list_cn_finalize
