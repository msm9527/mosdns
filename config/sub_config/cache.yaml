# 文件用途:
# - 定义各业务链路的缓存实例（全量、国内、国外、节点等）。
# 使用原则:
# - 不同链路分实例，避免缓存污染与统计耦合。
# - size 为“条目上限”而非内存字节数，按路由器可用内存分配。
plugins:
# 高阶参数已下沉到代码默认值（仍兼容旧键）:
# - nxdomain_ttl / servfail_ttl
# - l1_enabled / l1_total_cap / l1_shard_cap
# - wal_file / wal_sync_interval
# 默认行为:
# - WAL 文件自动由 dump_file 推导（*.dump -> *.wal）
# - L1 容量按 size 自动分档（小实例更保守）
#全部缓存 第1层缓存 直面客户端
  - tag: cache_all
    type: cache
    args:
      size: 800000
      lazy_cache_ttl: 259200000
#      exclude_ip:
#        - 28.0.0.0/8
#        - f2b0::/18
      dump_file: cache/cache_all.dump
      dump_interval: 36000

#全部缓存 第1层缓存 直面客户端
  - tag: cache_all_noleak
    type: cache
    args:
      size: 800000
      lazy_cache_ttl: 259200000
      exclude_ip:
#        - 28.0.0.0/8
#        - f2b0::/18
      dump_file: cache/cache_all_noleak.dump
      dump_interval: 36000

#中国域名列表的过期缓存
  - tag: cache_cn
    type: cache
    args:
      size: 500000
      lazy_cache_ttl: 259200000
      dump_file: cache/cache_cn.dump
      dump_interval: 36000

#列表外域名的过期缓存
  - tag: cache_google
    type: cache
    args:
      size: 300000
      lazy_cache_ttl: 259200000
      dump_file: cache/cache_google.dump
      dump_interval: 36000

  - tag: cache_google_node
    type: cache
    args:
      size: 300000
      lazy_cache_ttl: 259200000
      enable_ecs: true
      dump_file: cache/cache_google_node.dump
      dump_interval: 36000

#节点域名列表的过期缓存
  - tag: cache_node
    type: cache
    args:
      size: 300000
      lazy_cache_ttl: 259200000
      dump_file: cache/cache_node.dump
      dump_interval: 36000

#cnmihomo fakeip过期缓存
  - tag: cache_cnmihomo
    type: cache
    args:
      size: 300000
      lazy_cache_ttl: 259200000
      dump_file: cache/cache_cnmihomo.dump
      dump_interval: 36000
