plugins:
# 生产 WAL 配置说明:
# 1. 默认全量启用 WAL, 每个实例独立 .wal 文件, dump 仍作为 checkpoint 基线。
# 2. 灰度时可先仅保留部分实例的 wal_file/wal_sync_interval, 观察 dump 与 replay 状态后再全量开启。
# 3. 回滚时删除 wal_file/wal_sync_interval 并保留 dump_file/dump_interval, 现有 snapshot 仍可继续恢复。
#全部缓存 第1层缓存 直面客户端
  - tag: cache_all
    type: cache
    args:
      size: 20000000
      lazy_cache_ttl: 259200000
#      exclude_ip:
#        - 28.0.0.0/8
#        - f2b0::/18
      dump_file: cache/cache_all.dump
      wal_file: cache/cache_all.wal
      dump_interval: 36000
      wal_sync_interval: 1

#全部缓存 第1层缓存 直面客户端
  - tag: cache_all_noleak
    type: cache
    args:
      size: 20000000
      lazy_cache_ttl: 259200000
      exclude_ip:
#        - 28.0.0.0/8
#        - f2b0::/18
      dump_file: cache/cache_all_noleak.dump
      wal_file: cache/cache_all_noleak.wal
      dump_interval: 36000
      wal_sync_interval: 1

