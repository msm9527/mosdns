      domain_set_url: "http://127.0.0.1:9099/plugins/my_nov4rule/post"

#节点域名无v6 ip的域名清单和生成规则
  - tag: my_nodenov6list
    type: domain_output
    args:
      file_stat: gen/nodenov6list.txt
      file_rule: gen/nodenov6rule.txt
      max_entries: 50000
      dump_interval: 36060
      domain_set_url: "http://127.0.0.1:9099/plugins/my_nodenov6rule/post"

#节点域名无v4 v6 ip的域名清单和生成规则
  - tag: my_nodenov4list
    type: domain_output
    args:
      file_stat: gen/nodenov4list.txt
      file_rule: gen/nodenov4rule.txt
      max_entries: 50000
      dump_interval: 36080
      domain_set_url: "http://127.0.0.1:9099/plugins/my_nodenov4rule/post"
