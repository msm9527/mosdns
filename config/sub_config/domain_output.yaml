plugins:
# 说明：policy 高阶策略参数已下沉到代码自动推导（仍兼容旧 policy 配置）。
# 推导依据：file_stat/file_rule/domain_set_url 中的关键字（realip/fakeip/nov4/nov6/nodenov4/nodenov6/top_domains）。
# URL 规则：on_dirty_url/verify_url 不再硬编码 host，改为从 domain_set_url 自动提取 API 基址拼接路径。
#域名排行
  - tag: top_domains
    type: domain_output
    args:
      file_stat: gen/top_domains.txt
      enable_flags: true
      max_entries: 200000
      dump_interval: 36000

#访问过的realip的域名清单和生成规则
  - tag: my_realiplist
    type: domain_output
    args:
      file_stat: gen/realiplist.txt
      file_rule: gen/realiprule.txt
      max_entries: 80000
      dump_interval: 36005
      domain_set_url: "http://127.0.0.1:9099/plugins/my_realiprule/post"

#访问过的fakeip的域名清单和生成规则
  - tag: my_fakeiplist
    type: domain_output
    args:
      file_stat: gen/fakeiplist.txt
      file_rule: gen/fakeiprule.txt
      max_entries: 80000
      dump_interval: 36010
      domain_set_url: "http://127.0.0.1:9099/plugins/my_fakeiprule/post"

#访问过的无v6 ip的域名清单和生成规则
  - tag: my_nov6list
    type: domain_output
    args:
      file_stat: gen/nov6list.txt
      file_rule: gen/nov6rule.txt
      max_entries: 120000
