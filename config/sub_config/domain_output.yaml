plugins:
# 资源策略：以下 max_entries 采用路由器优先的保守默认值，避免高基数流量导致内存与落盘压力过高。
#域名排行
  - tag: top_domains
    type: domain_output
    args:
      file_stat: gen/top_domains.txt
      enable_flags: true
      max_entries: 200000
      dump_interval: 36000
      policy:
        kind: generic
        decay_days: 30
        track_qtype: true
        publish_mode: all

#访问过的realip的域名清单和生成规则
  - tag: my_realiplist
    type: domain_output
    args:
      file_stat: gen/realiplist.txt
      file_rule: gen/realiprule.txt
      max_entries: 80000
      dump_interval: 36005
      domain_set_url: "http://127.0.0.1:9099/plugins/my_realiprule/post"
      policy:
        kind: realip
        promote_after: 2
        decay_days: 21
        track_qtype: true
        publish_mode: promoted_only
        stale_after_minutes: 360
        refresh_cooldown_minutes: 120
        on_dirty_url: "http://127.0.0.1:9099/plugins/requery/enqueue"
        verify_url: "http://127.0.0.1:9099/plugins/my_realiplist/verify"

