plugins:
#域名排行
  - tag: top_domains
    type: domain_output
    args:
      file_stat: gen/top_domains.txt
      enable_flags: true
      max_entries: 10000000
      dump_interval: 36000
      policy:
        kind: generic
        decay_days: 30
        track_qtype: true
        publish_mode: all

#访问过的realip的域名清单和生成规则
  - tag: my_realiplist
    type: domain_output
    args:
      file_stat: gen/realiplist.txt
      file_rule: gen/realiprule.txt
      max_entries: 10000000
      dump_interval: 36005
      domain_set_url: "http://127.0.0.1:9099/plugins/my_realiprule/post"
      policy:
        kind: realip
        promote_after: 2
        decay_days: 21
        track_qtype: true
        publish_mode: promoted_only

