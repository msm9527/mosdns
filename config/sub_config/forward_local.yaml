# 文件用途:
# - 定义国内上游转发插件 `domestic`（主链路直连域名使用）。
# 依赖关系:
# - 被 `forward_1.yaml` 中的 `sequence_local*` 引用。
# 参数说明:
# - `concurrent`: 并发请求上限（多上游抢答）。
# - `upstreams`: 国内 DNS 上游列表（可替换为本地运营商/DoH 等）。
plugins:
# 定义了一个带过期缓存的内部使用/外部使用的国内dns服务器
  - tag: domestic
    type: aliapi
    args:
      concurrent: 3
      upstreams:
        - addr: "223.5.5.5"
        - addr: "223.6.6.6"
