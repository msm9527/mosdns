version: v2
policies:
  - name: adguard
    type: adguard_rule
    args:
      config_file: custom_config/adguard_sources.yaml
  - name: geosite_cn
    type: sd_set_light
    args:
      config_file: custom_config/diversion_sources.yaml
      bind_to: geosite_cn
  - name: geosite_no_cn
    type: sd_set_light
    args:
      config_file: custom_config/diversion_sources.yaml
      bind_to: geosite_no_cn
