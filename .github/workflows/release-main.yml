name: Release (main)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  RELEASE_NAME_SUFFIX: "来源: mosdns-v5 + yyysuo/ph-v5"
  RELEASE_SUBTITLE: "副标题：原版来源 mosdns-v5，基于 yyysuo/mosdns 的 ph-v5 进行完善修改。"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-matrix:
    name: prepare release matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true
      - name: Generate matrix
        id: matrix
        run: |
          MATRIX=$(python ./release.py --github-matrix)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.display }}
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true

      - name: Compute version strings
        id: ver
        run: |
          BASE=$(tr -d '\r\n' < .version)
          if [ -z "$BASE" ]; then
            echo ".version is empty" >&2
            exit 1
          fi
          echo "VERSION=$BASE" >> $GITHUB_ENV

      - name: Build one target
        run: python ./release.py -i ${{ matrix.index }}
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ env.VERSION }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ./release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Prepare tag name
        run: |
          BASE=$(tr -d '\r\n' < .version)
          if [ -z "$BASE" ]; then
            echo ".version is empty" >&2
            exit 1
          fi
          echo "TAG_NAME=$BASE" >> $GITHUB_ENV

      - name: Read Go version from go.mod
        run: |
          GOV=$(awk '/^go / {print $2}' go.mod)
          echo "GO_VERSION=$GOV" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Delete existing release and tag
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const { owner, repo } = context.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
              core.info(`deleted existing release for tag ${tag}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`no existing release for tag ${tag}`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`deleted existing tag ${tag}`);
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) {
                throw error;
              }
              core.info(`no existing tag ${tag}`);
            }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Release ${{ env.TAG_NAME }} | ${{ env.RELEASE_NAME_SUFFIX }}"
          files: './artifacts/mosdns*.zip'
          prerelease: false
          generate_release_notes: true
          body: |
            ${{ env.RELEASE_SUBTITLE }}
            Built with Go ${{ env.GO_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tag `last` to this commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git fetch --tags --force
          git tag -f last $GITHUB_SHA
          git push origin -f last
