name: Release mosdns (manual)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: '发布通道：candidate=候选 RC 预发布，stable=正式 latest'
        required: true
        default: 'stable'
        type: choice
        options:
          - candidate
          - stable
      ref:
        description: '用于发布的分支或提交，默认 main'
        required: false
        default: 'main'
      tag_name:
        description: '发布 tag，留空时 stable 使用 .version，candidate 自动生成 .version-rc.*'
        required: false
        default: ''

env:
  RELEASE_NAME_SUFFIX: "来源: mosdns-v5 + yyysuo/ph-v5"
  RELEASE_SUBTITLE: "副标题：原版来源 mosdns-v5，基于 yyysuo/mosdns 的 ph-v5 进行完善修改。"

permissions:
  contents: write

jobs:
  prepare_release:
    name: prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.meta.outputs.version }}
      release_channel: ${{ steps.meta.outputs.release_channel }}
      release_prerelease: ${{ steps.meta.outputs.release_prerelease }}
      release_make_latest: ${{ steps.meta.outputs.release_make_latest }}
      release_title: ${{ steps.meta.outputs.release_title }}
      go_version: ${{ steps.gov.outputs.go_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true

      - name: Generate matrix
        id: matrix
        run: |
          MATRIX=$(python ./release.py --github-matrix)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Resolve tag name and release channel
        id: meta
        run: |
          CHANNEL='${{ inputs.channel }}'
          BASE='${{ inputs.tag_name }}'
          if [ -z "$BASE" ]; then
            FILE_VER=$(tr -d '\r\n' < .version)
            if [ -z "$FILE_VER" ]; then
              echo "tag_name and .version are both empty" >&2
              exit 1
            fi
            if [ "$CHANNEL" = "candidate" ]; then
              BASE="${FILE_VER}-rc.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            else
              BASE="$FILE_VER"
            fi
          fi
          if [ -z "$BASE" ]; then
            echo "tag_name and .version are both empty" >&2
            exit 1
          fi
          if [ "$CHANNEL" = "candidate" ]; then
            PRERELEASE=true
            MAKE_LATEST=false
            TITLE=Candidate
          else
            PRERELEASE=false
            MAKE_LATEST=true
            TITLE=Release
          fi
          echo "version=$BASE" >> "$GITHUB_OUTPUT"
          echo "release_channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "release_prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"
          echo "release_title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Read Go version from go.mod
        id: gov
        run: |
          GOV=$(awk '/^go / {print $2}' go.mod)
          echo "go_version=$GOV" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.display }}
    runs-on: ubuntu-latest
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_release.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true

      - name: Build one target
        run: python ./release.py -i ${{ matrix.index }}
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ needs.prepare_release.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ./release/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: publish manual release
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Delete existing release and tag
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ needs.prepare_release.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const { owner, repo } = context.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
              core.info(`deleted existing release for tag ${tag}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`no existing release for tag ${tag}`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`deleted existing tag ${tag}`);
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) {
                throw error;
              }
              core.info(`no existing tag ${tag}`);
            }

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.version }}
          target_commitish: ${{ inputs.ref }}
          name: "${{ needs.prepare_release.outputs.release_title }} ${{ needs.prepare_release.outputs.version }} | ${{ env.RELEASE_NAME_SUFFIX }}"
          files: './artifacts/mosdns*.zip'
          prerelease: ${{ needs.prepare_release.outputs.release_prerelease }}
          make_latest: ${{ needs.prepare_release.outputs.release_make_latest }}
          generate_release_notes: true
          body: |
            ${{ env.RELEASE_SUBTITLE }}
            Channel: ${{ needs.prepare_release.outputs.release_channel }}
            Source ref: ${{ inputs.ref }}
            Built with Go ${{ needs.prepare_release.outputs.go_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sshpass and rsync
        run: |
          sudo apt-get update -y
          sudo apt-get install -y sshpass rsync

      - name: Upload release binaries to custom server
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          ARTIFACT_DIR: ./artifacts
          DEPLOY_SERVERS: ${{ secrets.DEPLOY_SERVERS }}
        run: ./scripts/upload_release_to_server.sh
