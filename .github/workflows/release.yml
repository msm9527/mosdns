name: Release mosdns

on:
  push:
    tags:
      - 'msm-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          check-latest: true

      - name: Read version from .version
        run: |
          BASE=$(tr -d '\r\n' < .version)
          if [ -z "$BASE" ]; then
            echo ".version is empty" >&2
            exit 1
          fi
          echo "VERSION=$BASE" >> $GITHUB_ENV

      - name: Read Go version from go.mod
        run: |
          GOV=$(awk '/^go / {print $2}' go.mod)
          echo "GO_VERSION=$GOV" >> $GITHUB_ENV

      - name: Build
        run: python ./release.py
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ env.VERSION }}

      - name: Delete existing release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ env.VERSION }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const { owner, repo } = context.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
              core.info(`deleted existing release for tag ${tag}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`no existing release for tag ${tag}`);
            }

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }} | 来源: mosdns-v5 + yyysuo/ph-v5"
          files: './release/mosdns*.zip'
          prerelease: false
          generate_release_notes: true
          body: |
            副标题：原版来源 mosdns-v5，基于 yyysuo/mosdns 的 ph-v5 进行完善修改。
            Built with Go ${{ env.GO_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
