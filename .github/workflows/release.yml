name: Release mosdns (manual)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: '发布通道：candidate=候选 RC 预发布，stable=正式 latest'
        required: true
        default: 'stable'
        type: choice
        options:
          - candidate
          - stable
      ref:
        description: '用于发布的分支或提交，默认 main'
        required: false
        default: 'main'
      tag_name:
        description: '发布 tag，留空时 stable 使用 .version，candidate 自动生成 .version-rc.*'
        required: false
        default: ''

env:
  RELEASE_NAME_SUFFIX: "来源: mosdns-v5 + yyysuo/ph-v5"
  RELEASE_SUBTITLE: "副标题：原版来源 mosdns-v5，基于 yyysuo/mosdns 的 ph-v5 进行完善修改。"

permissions:
  contents: write

jobs:

  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true

      - name: Resolve tag name and release channel
        run: |
          CHANNEL='${{ inputs.channel }}'
          BASE='${{ inputs.tag_name }}'
          if [ -z "$BASE" ]; then
            FILE_VER=$(tr -d '\r\n' < .version)
            if [ -z "$FILE_VER" ]; then
              echo "tag_name and .version are both empty" >&2
              exit 1
            fi
            if [ "$CHANNEL" = "candidate" ]; then
              BASE="${FILE_VER}-rc.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            else
              BASE="$FILE_VER"
            fi
          fi
          if [ -z "$BASE" ]; then
            echo "tag_name and .version are both empty" >&2
            exit 1
          fi
          echo "VERSION=$BASE" >> $GITHUB_ENV
          echo "RELEASE_CHANNEL=$CHANNEL" >> $GITHUB_ENV
          if [ "$CHANNEL" = "candidate" ]; then
            echo "RELEASE_PRERELEASE=true" >> $GITHUB_ENV
            echo "RELEASE_MAKE_LATEST=false" >> $GITHUB_ENV
            echo "RELEASE_TITLE=Candidate" >> $GITHUB_ENV
          else
            echo "RELEASE_PRERELEASE=false" >> $GITHUB_ENV
            echo "RELEASE_MAKE_LATEST=true" >> $GITHUB_ENV
            echo "RELEASE_TITLE=Release" >> $GITHUB_ENV
          fi

      - name: Read Go version from go.mod
        run: |
          GOV=$(awk '/^go / {print $2}' go.mod)
          echo "GO_VERSION=$GOV" >> $GITHUB_ENV

      - name: Build
        run: python ./release.py
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ env.VERSION }}

      - name: Delete existing release and tag
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ env.VERSION }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const { owner, repo } = context.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });
              core.info(`deleted existing release for tag ${tag}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`no existing release for tag ${tag}`);
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.info(`deleted existing tag ${tag}`);
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) {
                throw error;
              }
              core.info(`no existing tag ${tag}`);
            }

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ inputs.ref }}
          name: "${{ env.RELEASE_TITLE }} ${{ env.VERSION }} | ${{ env.RELEASE_NAME_SUFFIX }}"
          files: './release/mosdns*.zip'
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          make_latest: ${{ env.RELEASE_MAKE_LATEST }}
          generate_release_notes: true
          body: |
            ${{ env.RELEASE_SUBTITLE }}
            Channel: ${{ env.RELEASE_CHANNEL }}
            Source ref: ${{ inputs.ref }}
            Built with Go ${{ env.GO_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install sshpass and rsync
        run: |
          sudo apt-get update -y
          sudo apt-get install -y sshpass rsync

      - name: Upload release binaries to custom server
        env:
          VERSION: ${{ env.VERSION }}
          ARTIFACT_DIR: ./release
          DEPLOY_SERVERS: ${{ secrets.DEPLOY_SERVERS }}
        run: ./scripts/upload_release_to_server.sh
