name: Test mosdns

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build
        run: go build -v ./...

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Test Unit Packages
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(go list ./... | grep -v '^github.com/IrineSistiana/mosdns/v5/e2e$')
          go test -v "${packages[@]}" -count=1 -timeout 60s

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Test E2E
        env:
          MOSDNS_E2E_REPORT_DIR: ${{ github.workspace }}/e2e/reports/latest
        run: go test -v ./e2e -count=1 -timeout 60s

      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/reports
          if-no-files-found: warn
